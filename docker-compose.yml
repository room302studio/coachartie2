# =============================================================================
# Coach Artie Docker Compose - INFRASTRUCTURE ONLY
# =============================================================================
#
# IMPORTANT: Application services (capabilities, discord, brain, sms) run via PM2
# See: ecosystem.config.cjs and DEPLOYMENT.md
#
# This file ONLY contains:
#   - redis: Job queues and response routing
#   - sandbox: Isolated code execution environment
#
# To start: docker compose up -d
# To check:  docker compose ps
#
# Application services:
#   pm2 start ecosystem.config.cjs
#   pm2 status
#
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # REDIS - Job queues, response routing, caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --port 47320 --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:47320:47320"  # Expose to localhost for PM2 services
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "47320", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SANDBOX - Isolated code execution (Artie's "laptop")
  # ---------------------------------------------------------------------------
  sandbox:
    image: debian:bookworm-slim
    container_name: coachartie-sandbox
    hostname: artie-laptop
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    volumes:
      - sandbox-workspace:/workspace
      - sandbox-home:/root
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: >
      /bin/bash -c "
      rm -rf /var/cache/apt/archives/* &&
      apt-get clean &&
      apt-get update -qq &&
      apt-get install -y -qq --fix-missing curl wget git jq python3 sqlite3 tmux &&
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/githubcli-archive-keyring.gpg &&
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg &&
      echo \"deb [arch=\$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\" > /etc/apt/sources.list.d/github-cli.list &&
      apt-get update -qq &&
      apt-get install -y -qq --fix-missing gh &&
      if [ -n \"\$GITHUB_TOKEN\" ]; then
        echo '✅ GitHub CLI ready (using GITHUB_TOKEN)';
      else
        echo '⚠️  GITHUB_TOKEN not set - gh CLI will have limited access';
      fi &&
      echo '═══════════════════════════════════════════' &&
      echo '🖥️  Artie Laptop Ready' &&
      echo '═══════════════════════════════════════════' &&
      echo 'Tools: git, gh, jq, curl, python3, sqlite3, tmux' &&
      echo 'Workspace: /workspace' &&
      echo 'Tmux session: artie-main' &&
      echo '═══════════════════════════════════════════' &&
      tmux new-session -d -s artie-main -c /workspace &&
      echo '✅ Tmux session artie-main started' &&
      tmux wait-for -S artie-main-ready &&
      sleep infinity
      "
    healthcheck:
      test: ["CMD", "which", "gh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  redis_data:
  sandbox-workspace:
  sandbox-home:

networks:
  default:
    name: coachartie_network
